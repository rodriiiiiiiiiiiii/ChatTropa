name: Agente IA Tropa 194

on:
  schedule:
    # Se ejecuta todos los días a las 19:00 UTC (20:00 hora peninsular española en invierno / 21:00 en verano)
    - cron: '0 19 * * *'
  workflow_dispatch: # Este comando mágico añade un botón en GitHub para ejecutarlo a mano cuando quieras

jobs:
  ejecutar-bot:
    runs-on: ubuntu-latest # Usamos un servidor Linux gratuito de GitHub

    steps:
    - name: 📥 Clonar el repositorio
      uses: actions/checkout@v3

    - name: 🐍 Configurar Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 📦 Instalar dependencias
      run: |
        pip install -r requirements.txt

    - name: 🔐 Generar archivos de credenciales de Google
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}
      run: |
        echo "$GOOGLE_CREDENTIALS" > credentials.json
        echo "$GOOGLE_TOKEN" > token.json

    - name: 🚀 Ejecutar el Asistente IA
      env:
        GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
        GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python asistente.py